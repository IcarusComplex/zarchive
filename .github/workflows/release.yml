name: Release

# Triggers on any version tag push:
#   v1.2.3          → stable release  (make_latest: true)
#   v1.2.3-beta.1   → pre-release     (make_latest: false, prerelease: true)
on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  # ── Windows x64 ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build distributable
        run: .\gradlew.bat createDistributable

      - name: Package zip
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          Copy-Item build-tools\README.txt build\compose\binaries\main\app\ZArchive\ -Force
          Compress-Archive build\compose\binaries\main\app\ZArchive `
            -DestinationPath "ZArchive-windows-x64-$ver.zip" -CompressionLevel Optimal
          Write-Output "Packaged ZArchive-windows-x64-$ver.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: ZArchive-windows-x64-*.zip

  # ── macOS arm64 (Apple Silicon) ────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest   # GitHub's macos-latest is Apple Silicon (M-series)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build distributable
        run: ./gradlew createDistributable

      - name: Print jpackage logs on failure
        if: failure()
        run: find build/compose/logs -name "*.txt" 2>/dev/null | while read f; do echo "=== $f ==="; cat "$f"; done

      - name: Package zip
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          mkdir -p ZArchive
          cp -r build/compose/binaries/main/app/ZArchive.app ZArchive/
          cp build-tools/README-mac.txt ZArchive/README.txt
          zip -r "ZArchive-macos-arm64-$VER.zip" ZArchive
          echo "Packaged ZArchive-macos-arm64-$VER.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: ZArchive-macos-arm64-*.zip

  # ── Android (universal APK, signed) ──────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          cp build/outputs/apk/release/*.apk "ZArchive-android-$VER.apk"
          echo "Packaged ZArchive-android-$VER.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-dist
          path: ZArchive-android-*.apk

  # ── Publish GitHub Release ─────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases and upload assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true   # downloads all artifacts into one directory

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ZArchive-windows-x64-*.zip
            ZArchive-macos-arm64-*.zip
            ZArchive-android-*.apk
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          generate_release_notes: true
